version: "3.9"

name: observability-local-lab

services:
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.config.file=/etc/prometheus/web.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --storage.tsdb.wal-compression
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/web.yml:/etc/prometheus/web.yml:ro
      - ../../prometheus/rules:/etc/prometheus/rules:ro
      - ../../prometheus/recording-rules:/etc/prometheus/recording-rules:ro
      - ../../prometheus/scrape-configs:/etc/prometheus/scrape-configs:ro
      - ./certs:/etc/prometheus/certs:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "-qO-", "https://localhost:9090/-/healthy", "--no-check-certificate", "--user=prom_admin", "--password=prom-admin-change-me"]
      interval: 30s
      timeout: 5s
      retries: 5
    depends_on:
      - alertmanager
      - blackbox-exporter
      - node-exporter
      - otel-collector
    networks:
      - observability

  alertmanager:
    image: prom/alertmanager:v0.28.0
    container_name: alertmanager
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
      - --web.config.file=/etc/alertmanager/web.yml
      - --config.expand-env
    env_file:
      - ../../.env
    ports:
      - "9093:9093"
    volumes:
      - ../../alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ../../alertmanager/templates:/etc/alertmanager/templates:ro
      - ./alertmanager/web.yml:/etc/alertmanager/web.yml:ro
      - ./certs:/etc/alertmanager/certs:ro
      - alertmanager-data:/alertmanager
    healthcheck:
      test: ["CMD", "wget", "-qO-", "https://localhost:9093/-/healthy", "--no-check-certificate", "--user=alert_admin", "--password=alert-admin-change-me"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - observability

  grafana:
    image: grafana/grafana-oss:11.2.2
    container_name: grafana
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-change-me}
      GF_METRICS_ENABLED: "true"
      GF_SERVER_PROTOCOL: https
      GF_SERVER_CERT_FILE: /etc/grafana/certs/tls.crt
      GF_SERVER_CERT_KEY: /etc/grafana/certs/tls.key
      GRAFANA_PROMETHEUS_URL: https://prometheus:9090
      GRAFANA_ALERTMANAGER_URL: https://alertmanager:9093
      PROMETHEUS_BASIC_AUTH_USER: ${PROMETHEUS_BASIC_AUTH_USER:-prom_admin}
      PROMETHEUS_BASIC_AUTH_PASSWORD: ${PROMETHEUS_BASIC_AUTH_PASSWORD:-prom-admin-change-me}
      ALERTMANAGER_BASIC_AUTH_USER: ${ALERTMANAGER_BASIC_AUTH_USER:-alert_admin}
      ALERTMANAGER_BASIC_AUTH_PASSWORD: ${ALERTMANAGER_BASIC_AUTH_PASSWORD:-alert-admin-change-me}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO:-oncall@example.com}
      TEAMS_WEBHOOK_URL: ${TEAMS_WEBHOOK_URL:-}
    ports:
      - "3000:3000"
    volumes:
      - ../../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../grafana/dashboards-json:/var/lib/grafana/dashboards-json:ro
      - ./certs:/etc/grafana/certs:ro
      - grafana-data:/var/lib/grafana
    healthcheck:
      test: ["CMD", "wget", "-qO-", "https://localhost:3000/api/health", "--no-check-certificate"]
      interval: 30s
      timeout: 5s
      retries: 5
    depends_on:
      - prometheus
      - alertmanager
    networks:
      - observability

  otel-collector:
    image: public.ecr.aws/aws-observability/aws-otel-collector:v0.43.0
    container_name: otel-collector
    restart: unless-stopped
    command:
      - --config=/etc/otel/collector.yaml
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-dev}
      CLUSTER: ${CLUSTER:-local-lab}
      TEAM: ${TEAM:-platform}
      AWS_REGION: ${AWS_REGION:-us-east-1}
    volumes:
      - ./otel/collector.yaml:/etc/otel/collector.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
      - "9464:9464"
      - "13133:13133"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:13133/"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - observability

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node-exporter
    restart: unless-stopped
    command:
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($|/)
    volumes:
      - /:/host:ro,rslave
    ports:
      - "9100:9100"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9100/metrics"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - observability

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: blackbox-exporter
    restart: unless-stopped
    command:
      - --config.file=/etc/blackbox/blackbox.yml
    volumes:
      - ../../exporters/blackbox/blackbox.yml:/etc/blackbox/blackbox.yml:ro
    ports:
      - "9115:9115"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9115/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - observability

  sample-app-node:
    build:
      context: ../../examples/sample-app-node
    container_name: sample-app-node
    restart: unless-stopped
    profiles: ["examples"]
    environment:
      PORT: 8080
      OTEL_SERVICE_NAME: sample-app-node
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      ENVIRONMENT: ${ENVIRONMENT:-dev}
      CLUSTER: ${CLUSTER:-local-lab}
      TEAM: ${TEAM:-platform}
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
    depends_on:
      - otel-collector
    networks:
      - observability

  sample-app-python:
    build:
      context: ../../examples/sample-app-python
    container_name: sample-app-python
    restart: unless-stopped
    profiles: ["examples"]
    environment:
      PORT: 8080
      OTEL_SERVICE_NAME: sample-app-python
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      ENVIRONMENT: ${ENVIRONMENT:-dev}
      CLUSTER: ${CLUSTER:-local-lab}
      TEAM: ${TEAM:-platform}
    ports:
      - "8082:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
    depends_on:
      - otel-collector
    networks:
      - observability

  sample-app-java:
    build:
      context: ../../examples/sample-app-java
    container_name: sample-app-java
    restart: unless-stopped
    profiles: ["examples"]
    environment:
      PORT: 8080
      OTEL_SERVICE_NAME: sample-app-java
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      ENVIRONMENT: ${ENVIRONMENT:-dev}
      CLUSTER: ${CLUSTER:-local-lab}
      TEAM: ${TEAM:-platform}
    ports:
      - "8083:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
    depends_on:
      - otel-collector
    networks:
      - observability

volumes:
  prometheus-data: {}
  alertmanager-data: {}
  grafana-data: {}

networks:
  observability:
    driver: bridge
