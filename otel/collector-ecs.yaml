extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  ecs_observer:
    cluster_name: ${ECS_CLUSTER_NAME}
    cluster_region: ${AWS_REGION}
    result_file: /etc/ecs_sd_targets.yaml
    refresh_interval: 60s
    services:
      - name_pattern: .*
  sigv4auth:
    region: ${AWS_REGION}
    service: aps

receivers:
  awsecscontainermetrics:
    collection_interval: 30s
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  prometheus:
    config:
      scrape_configs:
        - job_name: ecs-tasks
          scrape_interval: 30s
          file_sd_configs:
            - files: [/etc/ecs_sd_targets.yaml]
          relabel_configs:
            - source_labels: [__meta_ecs_cluster_name]
              target_label: cluster
            - source_labels: [__meta_ecs_service_name]
              target_label: service
            - target_label: namespace
              replacement: application

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 700
    spike_limit_mib: 256
  resource:
    attributes:
      - key: environment
        action: upsert
        value: ${ENVIRONMENT}
      - key: cluster
        action: upsert
        value: ${ECS_CLUSTER_NAME}
      - key: team
        action: upsert
        value: ${TEAM}
  batch:
    send_batch_size: 2048
    timeout: 10s

exporters:
  prometheusremotewrite:
    endpoint: ${PROMETHEUS_REMOTE_WRITE_URL}
    auth:
      authenticator: sigv4auth
    resource_to_telemetry_conversion:
      enabled: true
    retry_on_failure:
      enabled: true
    queue_config:
      enabled: true
      num_consumers: 4
      queue_size: 10000
  awsxray:
    region: ${AWS_REGION}
  logging:
    loglevel: info

service:
  extensions: [health_check, ecs_observer, sigv4auth]
  telemetry:
    metrics:
      address: 0.0.0.0:8888
  pipelines:
    metrics:
      receivers: [awsecscontainermetrics, prometheus, otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [prometheusremotewrite, logging]
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [awsxray, logging]
