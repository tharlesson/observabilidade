extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  sigv4auth:
    region: ${AWS_REGION}
    service: aps

receivers:
  hostmetrics:
    collection_interval: 30s
    scrapers:
      cpu: {}
      memory: {}
      filesystem: {}
      disk: {}
      network: {}
      process: {}
      processes: {}
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  prometheus:
    config:
      scrape_configs:
        - job_name: local-node-exporter
          scrape_interval: 30s
          static_configs:
            - targets: ["127.0.0.1:9100"]
              labels:
                service: ec2
                namespace: infrastructure
        - job_name: local-app-metrics
          scrape_interval: 30s
          static_configs:
            - targets: ["127.0.0.1:9464", "127.0.0.1:8080"]
              labels:
                service: local-app
                namespace: application

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 700
    spike_limit_mib: 256
  resource:
    attributes:
      - key: environment
        action: upsert
        value: ${ENVIRONMENT}
      - key: cluster
        action: upsert
        value: ${CLUSTER}
      - key: team
        action: upsert
        value: ${TEAM}
  batch:
    send_batch_size: 2048
    timeout: 10s

exporters:
  prometheusremotewrite:
    endpoint: ${PROMETHEUS_REMOTE_WRITE_URL}
    auth:
      authenticator: sigv4auth
    resource_to_telemetry_conversion:
      enabled: true
    retry_on_failure:
      enabled: true
    queue_config:
      enabled: true
      num_consumers: 4
      queue_size: 10000
  awsxray:
    region: ${AWS_REGION}
  logging:
    loglevel: info

service:
  extensions: [health_check, sigv4auth]
  telemetry:
    metrics:
      address: 0.0.0.0:8888
  pipelines:
    metrics:
      receivers: [hostmetrics, otlp, prometheus]
      processors: [memory_limiter, resource, batch]
      exporters: [prometheusremotewrite, logging]
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [awsxray, logging]
