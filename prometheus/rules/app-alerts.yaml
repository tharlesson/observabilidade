groups:
  - name: application-alerts
    interval: 30s
    rules:
      - alert: AppHighErrorRate
        expr: sum by(service, namespace, environment, cluster, team) (rate(http_server_requests_total{status_code=~"5.."}[5m])) / clamp_min(sum by(service, namespace, environment, cluster, team) (rate(http_server_requests_total[5m])), 1) > 0.05
        for: 10m
        labels:
          severity: critical
          team: "{{ $labels.team }}"
          service: "{{ $labels.service }}"
          namespace: "{{ $labels.namespace }}"
          environment: "{{ $labels.environment }}"
          cluster: "{{ $labels.cluster }}"
        annotations:
          summary: "Application high error rate"
          description: "Service {{ $labels.service }} has 5xx rate above 5% for 10m."
          runbook_url: "https://example.local/runbooks/app-high-error-rate"

      - alert: AppHighLatencyP95
        expr: histogram_quantile(0.95, sum by (le, service, namespace, environment, cluster, team) (rate(http_server_duration_seconds_bucket[5m]))) > 1.2
        for: 10m
        labels:
          severity: warning
          team: "{{ $labels.team }}"
          service: "{{ $labels.service }}"
          namespace: "{{ $labels.namespace }}"
          environment: "{{ $labels.environment }}"
          cluster: "{{ $labels.cluster }}"
        annotations:
          summary: "Application p95 latency high"
          description: "Service {{ $labels.service }} has p95 latency above 1.2s for 10m."
          runbook_url: "https://example.local/runbooks/app-high-latency"

      - alert: AppLowThroughput
        expr: sum by(service, namespace, environment, cluster, team) (rate(http_server_requests_total[10m])) < 0.1
        for: 30m
        labels:
          severity: info
          team: "{{ $labels.team }}"
          service: "{{ $labels.service }}"
          namespace: "{{ $labels.namespace }}"
          environment: "{{ $labels.environment }}"
          cluster: "{{ $labels.cluster }}"
        annotations:
          summary: "Application low throughput"
          description: "Service {{ $labels.service }} has low traffic for 30m (verify expected behavior)."
          runbook_url: "https://example.local/runbooks/app-low-throughput"
