# Prometheus web configuration for TLS and basic auth.
# Generate bcrypt hash with: htpasswd -nBC 12 "prom_admin" | sed -e s/\$/\$\$/g
basic_auth_users:
  prom_admin: ${PROMETHEUS_BASIC_AUTH_HASH}

tls_server_config:
  cert_file: /etc/prometheus/certs/tls.crt
  key_file: /etc/prometheus/certs/tls.key
  min_version: TLS12
