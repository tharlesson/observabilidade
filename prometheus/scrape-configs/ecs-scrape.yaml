- job_name: ecs-prometheus-targets
  file_sd_configs:
    - files:
        - /etc/prometheus/targets/ecs-file-sd.yml
  scrape_interval: 30s
  metrics_path: /metrics
  relabel_configs:
    - source_labels: [__meta_ecs_cluster_name]
      target_label: cluster
    - source_labels: [__meta_ecs_service_name]
      target_label: service
    - source_labels: [__meta_ecs_task_family]
      target_label: namespace
    - source_labels: [__meta_ecs_task_definition_family]
      target_label: job
    - target_label: environment
      replacement: ${ENVIRONMENT}
    - target_label: team
      replacement: ${TEAM}
